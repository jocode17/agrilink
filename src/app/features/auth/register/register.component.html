<div class="register-container">
    <div class="register-card">
      <!-- Logo -->
      <div class="logo-section">
        <div class="logo-icon">
          <svg width="36" height="36" viewBox="0 0 40 40" fill="none">
            <rect width="40" height="40" rx="8" fill="#2D5A27"/>
            <path d="M20 8C16 8 12 12 12 18C12 24 16 28 20 32C24 28 28 24 28 18C28 12 24 8 20 8Z" fill="#4CAF50"/>
            <path d="M20 14C18 14 16 16 16 18C16 20 18 22 20 24C22 22 24 20 24 18C24 16 22 14 20 14Z" fill="white"/>
          </svg>
        </div>
        <span class="logo-text">AgriLink</span>
      </div>
  
      <h2>Create Your Account</h2>
  
      <!-- Farmer / Buyer Toggle -->
      <div class="role-toggle">
        <button
          [class.active]="activeTab === 'farmer'"
          (click)="switchTab('farmer')">
          🌾 I'm a farmer
        </button>
        <button
          [class.active]="activeTab === 'buyer'"
          (click)="switchTab('buyer')">
          🛒 I'm a buyer
        </button>
      </div>
  
      <!-- Error Message -->
      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>
  
      <!-- ═══ FARMER FORM ═══ -->
      <form *ngIf="activeTab === 'farmer'" (ngSubmit)="onRegisterFarmer()">
        <div class="form-row">
          <div class="form-group">
            <label>Farm Name</label>
            <input type="text" [(ngModel)]="farmName" name="farmName" placeholder="Enter Input" />
          </div>
          <div class="form-group">
            <label>Owner Name</label>
            <input type="text" [(ngModel)]="ownerName" name="ownerName" placeholder="Enter Input" />
          </div>
        </div>
  
        <div class="form-group">
          <label>Email</label>
          <input type="email" [(ngModel)]="farmerEmail" name="farmerEmail" placeholder="farmer@example.com" />
        </div>
  
        <div class="form-row">
          <div class="form-group">
            <label>Password</label>
            <input type="password" [(ngModel)]="farmerPassword" name="farmerPassword" placeholder="Enter Input" />
          </div>
          <div class="form-group">
            <label>Retype Pass</label>
            <input type="password" [(ngModel)]="farmerRetypePassword" name="farmerRetypePassword" placeholder="Enter Input" />
          </div>
        </div>
  
        <div class="form-group">
          <label>Phone number</label>
          <input type="text" [(ngModel)]="farmerPhone" name="farmerPhone" placeholder="+63 913 123 4567" />
        </div>
  
        <div class="form-group">
          <label>Address</label>
          <input type="text" [(ngModel)]="farmerAddress" name="farmerAddress" placeholder="Blk 12 Lot 16 #14 Laurel Road, Baras, Rizal" />
        </div>
  
        <div class="form-group">
          <label>Farm Description *</label>
          <textarea [(ngModel)]="farmDescription" name="farmDescription" rows="3"
            placeholder="Tell me about your farm, growing practices, and what makes your produce special..."></textarea>
        </div>
  
        <button type="submit" class="btn-register" [disabled]="isLoading">
          {{ isLoading ? 'Creating...' : 'Create Farmer Account' }}
        </button>
      </form>
  
      <!-- ═══ BUYER FORM ═══ -->
      <form *ngIf="activeTab === 'buyer'" (ngSubmit)="onRegisterBuyer()">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" [(ngModel)]="buyerFullName" name="buyerFullName" placeholder="Sarah Geronimo" />
        </div>
  
        <div class="form-group">
          <label>Email</label>
          <input type="email" [(ngModel)]="buyerEmail" name="buyerEmail" placeholder="buyer@example.com" />
        </div>
  
        <div class="form-row">
          <div class="form-group">
            <label>Password</label>
            <input type="password" [(ngModel)]="buyerPassword" name="buyerPassword" placeholder="Enter Input" />
          </div>
          <div class="form-group">
            <label>Retype Pass</label>
            <input type="password" [(ngModel)]="buyerRetypePassword" name="buyerRetypePassword" placeholder="Enter Input" />
          </div>
        </div>
  
        <div class="form-group">
          <label>Buyer Type *</label>
          <select [(ngModel)]="buyerType" name="buyerType">
            <option value="" disabled selected>Select</option>
            <option value="household">Household</option>
            <option value="restaurant">Restaurant</option>
            <option value="market">Market</option>
          </select>
        </div>
  
        <div class="form-group">
          <label>Phone Number</label>
          <input type="text" [(ngModel)]="buyerPhone" name="buyerPhone" placeholder="+63 913 123 4567" />
        </div>
  
        <div class="form-group">
          <label>Delivery Address</label>
          <input type="text" [(ngModel)]="buyerDeliveryAddress" name="buyerDeliveryAddress"
            placeholder="Blk 12 Lot 16 #14 Laurel Road, Baras, Rizal" />
        </div>
  
        <button type="submit" class="btn-register" [disabled]="isLoading">
          {{ isLoading ? 'Creating...' : 'Create Buyer Account' }}
        </button>
      </form>
  
      <p class="login-link">
        Already have an account? <a routerLink="/login">Sign in</a>
      </p>
    </div>
  </div>
